<!DOCTYPE html>  <html lang="en">  <head>  <meta charset="UTF-8">  
<meta name="viewport" content="width=device-width, initial-scale=1.0">  <title>A Little Gift ❤️</title>  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">  <style>  
  
*{  
    margin:0;  
    padding:0;  
    box-sizing:border-box;  
}  
  
  
body{  
  
    height:100vh;  
    overflow:hidden;  
  
    font-family:'Poppins',sans-serif;  
  
    display:flex;  
    justify-content:center;  
    align-items:center;  
  
    background:  
    linear-gradient(-45deg,#ff4fa3,#ff80c8,#c471ed,#6c63ff);  
  
    background-size:400% 400%;  
  
    animation:bg 12s infinite;  
  
}  
  
  
  
@keyframes bg{  
  
    0%{  
        background-position:0% 50%;  
    }  
  
    50%{  
        background-position:100% 50%;  
    }  
  
    100%{  
        background-position:0% 50%;  
    }  
  
}  
  
  
  
#hearts{  
  
    position:fixed;  
    inset:0;  
  
    pointer-events:none;  
  
}  
  
  
  
.heart{  
  
    position:absolute;  
  
    bottom:-50px;  
  
    animation:heart 7s linear forwards;  
  
}  
  
  
  
@keyframes heart{  
  
    from{  
  
        transform:translateY(0);  
        opacity:1;  
  
    }  
  
    to{  
  
        transform:translateY(-110vh);  
        opacity:0;  
  
    }  
  
}  
  
  
  
  
.card{  
  
    width:90%;  
    max-width:420px;  
  
    padding:45px 30px;  
  
    text-align:center;  
  
    border-radius:30px;  
  
    background:rgba(255,255,255,.15);  
  
    backdrop-filter:blur(20px);  
  
  
    box-shadow:  
    0 0 40px rgba(255,255,255,.3);  
  
  
    animation:show 1.2s;  
  
}  
  
  
  
@keyframes show{  
  
from{  
  
opacity:0;  
transform:scale(.7);  
  
}  
  
to{  
  
opacity:1;  
transform:scale(1);  
  
}  
  
}  
  
  
  
  
.small{  
  
color:white;  
  
font-size:18px;  
  
}  
  
  
  
h1{  
  
font-family:'Great Vibes',cursive;  
  
font-size:55px;  
  
color:white;  
  
margin:15px 0;  
  
}  
  
  
  
#typing{  
  
color:white;  
  
font-size:18px;  
  
height:35px;  
  
}  
  
  
  
  
button{  
  
  
margin-top:30px;  
  
padding:16px 35px;  
  
border:none;  
  
border-radius:50px;  
  
font-size:18px;  
  
font-weight:600;  
  
color:white;  
  
background:  
linear-gradient(45deg,#ff2d8d,#ff80c8);  
  
  
cursor:pointer;  
  
box-shadow:  
0 0 25px pink;  
  
  
}  
  
#countdown{  
  
font-size:70px;  
  
font-weight:700;  
  
color:white;  
  
margin:20px;  
  
  
text-shadow:  
0 0 20px pink;  
  
  
animation:pulse 1s infinite;  
  
}  
#countdown.message{  
  
font-size:24px;  
  
animation:none;  
  
}  
  
@keyframes pulse{  
  
50%{  
  
transform:scale(1.3);  
  
}  
  
}  
  
  
#screen2 h1{  
  
font-size:50px;  
  
}  
/* ===========================  
   SCREEN 3  
=========================== */  
  
#screen3{  
    display:none;  
}  
  
#screen3 h2{  
    color:white;  
    font-family:'Great Vibes', cursive;  
    font-size:38px;  
}  
  
.envelope-name{  
    font-size:38px;  
    color:white;  
}  
   
#letter{  
    display:none;  
}  
    #screen3{  
    display:none;  
    flex-direction:column;  
    justify-content:flex-start;  
    align-items:center;  
    text-align:center;  
  
    width:95%;  
    max-width:420px;  
    height:90vh;  
  
    overflow-y:auto;  
  
    padding:30px 20px;  
    }  
  
#envelope{  
  
    position:relative;  
  
    width:320px;  
    height:220px;  
  
    margin:20px auto;  
  
}  
  
/* Envelope Body */  
  
.envelope-body{  
  
    position:absolute;  
  
    bottom:0;  
  
    width:100%;  
    height:150px;  
  
    background:linear-gradient(135deg,#ff78b7,#ff4fa3);  
  
    border-radius:0 0 18px 18px;  
  
    box-shadow:  
    0 15px 35px rgba(0,0,0,.25);  
  
    display:flex;  
  
    flex-direction:column;  
  
    justify-content:center;  
  
    align-items:center;  
  
}  
  
/* Envelope Flap */  
  
.envelope-top{  
  
    position:absolute;  
  
    top:0;  
    left:0;  
  
    width:0;  
    height:0;  
  
    border-left:160px solid transparent;  
  
    border-right:160px solid transparent;  
  
    border-bottom:95px solid #ff9ccc;  
  
    transform-origin:top;  
  
    transition:1s;  
  
    z-index:5;  
  
}  
  
/* Letter */  
  
#letter{  
  
    position:absolute;  
  
    left:50%;  
  
    bottom:25px;  
  
    transform:translateX(-50%);  
  
    width:260px;  
  
    height:0;  
  
    overflow:visible;  
  
    transition:1s;  
  
    z-index:2;  
  
}  
  
/* Paper */  
  
.letter-paper{  
  
    background:white;  
  
    border-radius:15px;  
  
    padding:25px;  
  
    min-height:280px;  
  
    box-shadow:  
    0 10px 30px rgba(0,0,0,.25);  
  
}  
  
/* Heading */  
  
.letter-paper h2{  
  
    color:#ff3f90;  
  
    margin-bottom:20px;  
  
    font-size:34px;  
  
}  
  
/* Letter Text */  
  
#letterText{  
  
    color:#555;  
  
    font-size:16px;  
  
    line-height:1.8;  
  
    white-space:pre-line;  
  
}  
  
/* Envelope Text */  
  
.envelope-title{  
  
    color:white;  
  
    font-size:18px;  
  
}  
  
.envelope-name{  
  
    color:white;  
  
    font-family:'Great Vibes',cursive;  
  
    font-size:42px;  
  
}  
  
/* Open Button */  
  
#letterBtn{  
  
    margin-top:35px;  
  
    }  
</style>  </head>  <body>  <div id="hearts"></div>  <div class="card">  <p class="small">  
A Little Gift From  
</p>  <h1>  
Your Naitik ❤️  
</h1>  <p id="typing"></p>  <button onclick="nextScreen()">  Open My Surprise ✨

</button>  </div>  <!-- SCREEN 2 -->  <div class="card" id="screen2" style="display:none;">  <div style="font-size:60px;">  
👀  
</div>  <h1>  
Close Your Eyes...  
</h1>  <p style="color:white;font-size:18px;line-height:1.6;">  I Have A Little Surprise<br>
For You 🥰

</p>  <div id="countdown"></div>  <button id="openBtn" style="display:none;" onclick="screen3()">  Show Me 💖

</button>  </div>  
<!-- ===========================  
     SCREEN 3 : ENVELOPE  
=========================== -->  <div class="card" id="screen3" style="display:none;">  <div id="envelope">  

    <div class="envelope-top"></div>  

    <div class="envelope-body">  

        <p class="envelope-title">  
            💌 For My Beautiful  
        </p>  

        <h2 class="envelope-name">  
            Tanushree ❤️  
        </h2>  

    </div>  

    <div id="letter">  

        <div class="letter-paper">  

            <h2>  
                Happy Birthday ❤️  
            </h2>  

            <p id="letterText"></p>  

        </div>  

    </div>  

</div>  

<button id="letterBtn" onclick="openLetter()">  
    Open Letter 💌  
</button>

</div>  <script>  
  
  
const text =  
"Made only for my Rasmalai 🥰";  
  
  
let i=0;  
  
  
function type(){  
  
if(i<text.length){  
  
document.getElementById("typing").innerHTML += text[i];  
  
i++;  
  
setTimeout(type,70);  
  
}  
  
}  
  
  
type();  
  
  
  
  
  
function hearts(){  
  
let h=document.createElement("span");  
  
h.className="heart";  
  
h.innerHTML=  
["❤️","💖","💕","💗"][Math.floor(Math.random()*4)];  
  
  
h.style.left=Math.random()*100+"vw";  
  
h.style.fontSize=  
20+Math.random()*20+"px";  
  
  
document.getElementById("hearts").appendChild(h);  
  
  
setTimeout(()=>{  
  
h.remove();  
  
},7000);  
  
  
}  
  
  
setInterval(hearts,300);  
  
  
  
  
  
function nextScreen(){  
  
  
document.querySelector(".card").style.display="none";  
  
  
document.getElementById("screen2").style.display="block";  
  
  
startCountdown();  
  
  
}  
  
  
  
function startCountdown(){  
  
  
let count=3;  
  
  
let box=document.getElementById("countdown");  
  
  
let timer=setInterval(()=>{  
  
  
box.innerHTML=count;  
  
  
count--;  
  
  
if(count<0){  
  
  
clearInterval(timer);  
  
  
box.innerHTML=  
"You Can Open Your Eyes ❤️";  
box.classList.add("message");  
  
document.getElementById("openBtn").style.display="inline-block";  
  
  
}  
  
  
},1000);  
  
  
}  
  
  
  
function screen3(){  
  
    document.getElementById("screen2").style.display="none";  
  
    document.getElementById("screen3").style.display="block";  
  
}  
const message = `Happy Birthday,  
My Beautiful Tanushree ❤️  
  
Today is one of the most beautiful days because it's the day you came into this world.  
  
May your smile always stay the same,  
may all your dreams come true,  
and may happiness always find you.  
  
Thank you for being such an amazing person.  
  
Happy Birthday once again,  
My Rasmalai ❤️  
  
Forever Yours,  
Naitik 💖`;  
  
function openLetter(){  
  
    document.querySelector(".envelope-top").style.transform =  
    "rotateX(180deg)";  
  
    const letter = document.getElementById("letter");  
  
    letter.style.display = "block";  
  
    setTimeout(()=>{  
        letter.style.height = "380px";  
    },400);  
  
    let i=0;  
  
    const box=document.getElementById("letterText");  
  
    box.innerHTML="";  
  
    function typing(){  
  
        if(i<message.length){  
  
            box.innerHTML+=message.charAt(i);  
  
            i++;  
  
            setTimeout(typing,35);  
  
        }  
  
    }  
  
    setTimeout(typing,900);  
  
}  
  
  
</script> 
</body>  
</html>
